<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRD.IR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #00a;
            color:white;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        header {
            background-color: #008;
            padding: 20px;
            text-align: center;
        }
        .dashboard {
            display: flex;
            justify-content: space-around;
            background-color: #007;
            padding: 20px;
        }
        .dashboard div {
            text-align: center;
        }
        footer {
            background-color: #008;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        .content {
            padding: 0 9% 10px;
            text-align: justify;
        }
        .content a {
            color: lime;
            font-weight: bold;
        }
        .content a:hover {
            color: #fff;
        }
        .calendar {
        justify-content: center;
        display: grid;
        grid-template-columns: repeat(7, 45px);
        gap: 5px;
        text-align: center;
        color: #000;            
        font-weight: bold;
        }
        .calendar .day {
        padding: 10px;
        background-color: #fff;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        text-decoration: none;
        color: inherit;
        }
        .calendar .day:hover {
        background-color: #ddd;
        }
        .calendar .day.disabled {
        background-color: #00a;
        cursor: not-allowed;
        }
        .calendar .day.current-day {
        background-color: green;
        color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">WRD.IR</a></h1>
        <p><!--Current Date and Time in Iran:--> <span id="date-time"></span></p>
        <span id="weather">&nbsp;</span>
    </header>

    <div class="dashboard">
        <div>
            <h3>&nbsp;&nbsp;20+ Sources</h3>
        </div>
        <div>
            <h3>&nbsp;&nbsp;50+ Pages</h3>
        </div>
        <div>
            <h3>&nbsp;&nbsp;10+ Subdomains</h3>
        </div>
    </div>

    <div class="content">
        <p>We welcome content submissions!
            Share your insights with us for 
            potential consideration and 
            publishing opportunities.
            </p>

    </div>
    
    <div class="calendar" id="calendar"></div>

    <p>&nbsp;</p><br><br><br>
    <footer>
        <p>Contact us at: +98 99-6633-8898</p>
    </footer>

    <script>
        // Function to display current date and time
        function updateDateTime() {
            const now = new Date();
            // Options for the Iran timezone
            var options = {
                weekday: 'long', // Day of the week
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                //second: '2-digit',
                //timeZoneName: 'short'
            };
            // Get the current time in Iran
            var iranTime = new Intl.DateTimeFormat('en-IR', { 
                ...options, 
                timeZone: 'Asia/Tehran' 
            }).format(now);
            // Display the time
            document.getElementById("date-time").innerHTML = iranTime;
        }
        
        setInterval(updateDateTime, 1000);  // Update the time every second
        updateDateTime();  // Initial call to set the time immediately

        // Function to fetch weather data for Iran from the API
        function getWeather() {
            fetch('https://fa.wttr.in/Tehran?format=4')
                .then(response => response.text())
                .then(data => {
                    // Display the weather data in the <p> element
                    document.getElementById('weather').innerText = data;
                })
                .catch(error => {
                    // Handle any errors
                    document.getElementById('weather').innerText = "Failed to fetch weather data.";
                    console.error("Error fetching weather data: ", error);
                });
        }

        // Call the function to get the weather data
        getWeather();
    </script>

    <script>
        // Function to generate the current month's calendar
        function generateCalendar() {
            const calendarElement = document.getElementById('calendar');
            const currentDate = new Date();
            const currentMonth = currentDate.getMonth();  // Get current month (0-11)
            const currentYear = currentDate.getFullYear();  // Get current year
            const currentDay = currentDate.getDate();  // Get today's date
            const firstDay = new Date(currentYear, currentMonth, 1);  // First day of the month
            const lastDay = new Date(currentYear, currentMonth + 1, 0);  // Last day of the month
            const daysInMonth = lastDay.getDate();  // Get number of days in the month
            const firstDayOfWeek = firstDay.getDay();  // Get day of the week for the 1st day

            // Clear the calendar before adding new days
            calendarElement.innerHTML = '';

            // Create empty cells to fill the first row
            for (let i = 0; i < firstDayOfWeek; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.classList.add('day', 'disabled');
            calendarElement.appendChild(emptyCell);
            }

            // Create day cells
            for (let day = 1; day <= daysInMonth; day++) {
            const dayCell = document.createElement('a');
            dayCell.classList.add('day');
            dayCell.textContent = day;
            
            // Set the href for each day
            //dayCell.href = `/${currentYear}/${currentMonth + 1}/${day}`;
            //dayCell.href = `/${currentMonth + 1}/${day}`;

            // Highlight the current day
            if (day === currentDay) {
                dayCell.classList.add('current-day');
            }

            calendarElement.appendChild(dayCell);
            }
        }

        // Generate the calendar when the page loads
        generateCalendar();
    </script>    
</body>
</html>
