name: Fetch and Deploy

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'to fetch'
        required: true
        default: 'https://wrd.ir/'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch entire website
        run: |
          mkdir -p site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --directory-prefix=site \
            --span-hosts \
            --domains=wrd.ir,cdn.jsdelivr.net,fonts.googleapis.com,fonts.gstatic.com \
            --timeout=10 \
            --tries=2 \
            --no-check-certificate \
            "${{ github.event.inputs.url }}"
          
          find site -name "index.html" | head -1 | xargs -I {} cp {} site/index.html 2>/dev/null || true
          
      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
