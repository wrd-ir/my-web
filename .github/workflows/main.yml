name: Fetch

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'to fetch'
        required: true
        default: 'https://wrd.ir/'

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch website
        run: curl -v -L -o page.html "${{ github.event.inputs.url }}"
      
      - name: Push to repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add page.html
          git commit -m "Update page" || true
          git push
